<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Rotator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scanline"></div>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>Dashboard <span class="accent">Rotator</span></h1>
        <span id="connection-badge" class="badge disconnected">OFFLINE</span>
      </div>
      <button id="btn-settings" class="btn btn-icon" title="Settings">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M10 12.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z"/>
          <path d="M16.2 12.2a1.4 1.4 0 00.28 1.54l.05.05a1.7 1.7 0 01-1.2 2.9 1.7 1.7 0 01-1.2-.5l-.05-.05a1.4 1.4 0 00-1.54-.28 1.4 1.4 0 00-.84 1.28v.14a1.7 1.7 0 01-3.4 0v-.07a1.4 1.4 0 00-.92-1.28 1.4 1.4 0 00-1.54.28l-.05.05a1.7 1.7 0 01-2.4-2.4l.05-.05a1.4 1.4 0 00.28-1.54 1.4 1.4 0 00-1.28-.84H2.2a1.7 1.7 0 010-3.4h.07a1.4 1.4 0 001.28-.92 1.4 1.4 0 00-.28-1.54l-.05-.05a1.7 1.7 0 012.4-2.4l.05.05a1.4 1.4 0 001.54.28h.07a1.4 1.4 0 00.84-1.28V2.2a1.7 1.7 0 013.4 0v.07a1.4 1.4 0 00.84 1.28 1.4 1.4 0 001.54-.28l.05-.05a1.7 1.7 0 012.4 2.4l-.05.05a1.4 1.4 0 00-.28 1.54v.07a1.4 1.4 0 001.28.84h.14a1.7 1.7 0 010 3.4h-.07a1.4 1.4 0 00-1.28.84z"/>
        </svg>
      </button>
    </header>

    <!-- Now Showing Panel -->
    <section class="panel now-showing" id="now-showing">
      <div class="panel-label">NOW SHOWING</div>
      <div id="now-showing-content">
        <div class="now-showing-name" id="active-name">No dashboard active</div>
        <div class="progress-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-text" id="progress-text"></div>
        <div class="now-showing-actions">
          <button id="btn-pause" class="btn btn-ghost" disabled>Pause</button>
          <button id="btn-reload" class="btn btn-ghost" disabled>Force Reload</button>
        </div>
      </div>
    </section>

    <!-- URL List -->
    <section class="panel">
      <div class="section-header">
        <div class="panel-label">ROTATION QUEUE</div>
        <button id="btn-add-url" class="btn btn-primary">+ Add URL</button>
      </div>

      <div id="url-list"></div>

      <!-- Add URL Form (hidden by default) -->
      <div id="add-form" class="url-form" style="display: none;">
        <div class="form-title">New Entry</div>
        <div class="form-row">
          <label>Name</label>
          <input type="text" id="add-name" placeholder="My Dashboard">
        </div>
        <div class="form-row">
          <label>URL</label>
          <input type="url" id="add-url" placeholder="https://example.com/dashboard">
        </div>
        <div class="form-row">
          <label>Duration override (seconds)</label>
          <input type="number" id="add-duration" min="5" max="3600" placeholder="Leave blank for default">
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="add-reload">
            Reload on each display
          </label>
        </div>
        <div class="form-actions">
          <button id="btn-add-save" class="btn btn-primary">Add</button>
          <button id="btn-add-cancel" class="btn btn-ghost">Cancel</button>
        </div>
      </div>

      <!-- Memory info -->
      <div id="memory-info" class="memory-info"></div>
    </section>
  </div>

  <!-- Settings Modal -->
  <div id="settings-overlay" class="modal-overlay" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <div class="panel-label">SETTINGS</div>
        <button id="btn-settings-close" class="btn btn-icon btn-icon-sm" title="Close">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4l8 8M12 4l-8 8"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label for="default-duration">Default display duration</label>
          <div class="input-with-unit">
            <input type="number" id="default-duration" min="5" max="3600" value="30">
            <span class="input-unit">SEC</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
